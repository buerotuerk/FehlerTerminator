<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .button {
      background-color: #007bff;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 15px;
    }

    .button:active {
      background-color: #0056b3;
    }

    .back {
      margin-top: 20px;
      display: inline-block;
      cursor: pointer;
      color: #007bff;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>
function showStart() {
  document.getElementById("app").innerHTML = `
    <h1>FehlerTerminator</h1>
    <p style="text-align:center;">Hersteller auswählen</p>

    <div class="grid">
      <div class="button" onclick="selectHersteller('Vaillant')">Vaillant</div>
      <div class="button" onclick="selectHersteller('Stiebel')">Stiebel Eltron</div>
      <div class="button" onclick="selectHersteller('Buderus')">Buderus</div>
      <div class="button" onclick="selectHersteller('Viessmann')">Viessmann</div>
      <div class="button" onclick="selectHersteller('Junkers')">Junkers</div>
      <div class="button" onclick="selectHersteller('Samsung')">Samsung</div>
    </div>
  `;
}

function selectHersteller(name) {
  if (name === "Vaillant") {
    document.getElementById("app").innerHTML = `
      <h1>Vaillant</h1>
      <p style="text-align:center;">Kategorie auswählen</p>

      <div class="grid">
        <div class="button" onclick="selectKategorie('Gas')">Gasgeräte</div>
        <div class="button" onclick="selectKategorie('WP')">Wärmepumpen</div>
      </div>

      <div class="back" onclick="showStart()">← Zurück</div>
    `;
  } else {
    alert("Noch nicht implementiert: " + name);
  }
}

function selectKategorie(kategorie) {
  if (kategorie === "Gas") {
    document.getElementById("app").innerHTML = `
      <h1>Vaillant Gasgeräte</h1>
      <p>Fehlercode eingeben:</p>

      <input id="fehlercode" placeholder="z.B. F27">

      <div class="button" onclick="sucheFehler()">Suchen</div>

      <div class="back" onclick="selectHersteller('Vaillant')">← Zurück</div>
    `;
  } else {
    alert("Noch nicht implementiert");
  }
}

function sucheFehler() {
  const code = document.getElementById("fehlercode").value;

  if (code === "") {
    alert("Bitte Fehlercode eingeben");
    return;
  }

  alert("Fehlercode " + code + ": Beschreibung folgt später");
}

showStart();
</script>

</body>
</html>
