<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 18px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>FehlerTerminator</h1>

<input id="codeInput" placeholder="Fehlercode eingeben (z.B. F731)">
<button onclick="suche()">Suchen</button>

<div id="output"></div>

<script>
let alleCodes = [];

// 🔍 Suche Funktion
function suche() {
  let input = document.getElementById("codeInput").value;

  // normalize: alles groß + Leerzeichen raus
  let cleanInput = input.toUpperCase().replace(/\s/g, "");

  let treffer = alleCodes.find(e => 
    e.code.toUpperCase().replace(/\s/g, "") === cleanInput
  );

  let output = document.getElementById("output");

  if (treffer) {
    output.innerHTML = `
      <div class="result">
        <h2>${treffer.code}</h2>
        <p><strong>${treffer.bedeutung}</strong></p>

        <p><strong>Hinweis:</strong><br>${treffer.hinweis}</p>

        <p><strong>Gerät:</strong><br>${treffer.geraet}</p>

        <p style="color:gray;">
          Hersteller: ${treffer.hersteller}<br>
          Gruppe: ${treffer.gruppe}<br>
          Baujahr: ${treffer.baujahr}
        </p>
      </div>
    `;
  } else {
    output.innerHTML = `
      <div class="result">
        ❌ Kein Treffer gefunden
      </div>
    `;
  }
}
</script>

</body>
</html>
