<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    button:active {
      background: #0056b3;
    }
  </style>
</head>

<body>

<h1>FehlerTerminator</h1>

<input id="codeInput" placeholder="Fehlercode eingeben (z.B. F731)">
<button onclick="suche()">Suchen</button>

<script>
  // 👉 Zentrale Datenliste
  const alleCodes = [];

  function suche() {
    const code = document.getElementById("codeInput").value.toUpperCase();

    const treffer = alleCodes.find(e => e.code === code);

    if (treffer) {
      alert(
        code + "\n\n" +
        treffer.bedeutung + "\n\n" +
        "Hinweis: " + treffer.hinweis + "\n\n" +
        "Gerät: " + treffer.geraet
      );
    } else {
      alert("Kein Eintrag gefunden");
    }
  }
</script>

<!-- 👉 HIER kommen nur noch Daten-Dateien rein -->
<script src="data-vaillant-wp-luft.js"></script>
<script src="data-vaillant-gas.js"></script>

</body>
</html>
