
<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .button {
      background-color: #007bff;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .button:active {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <h1>FehlerTerminator</h1>
  <p style="text-align:center;">Hersteller auswählen</p>

  <div class="grid">
    <div class="button">Vaillant</div>
    <div class="button">Stiebel Eltron</div>
    <div class="button">Buderus</div>
    <div class="button">Viessmann</div>
    <div class="button">Junkers</div>
    <div class="button">Samsung</div>
  </div>

</body>
</html>
