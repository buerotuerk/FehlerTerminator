<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      background: #007bff;
      color: white;
      border: none;
    }

    button:active {
      background: #0056b3;
    }

    .resultBox {
      margin-top: 15px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    .errorBox {
      margin-top: 20px;
      padding: 20px;
      background: #ffe5e5;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h1>FehlerTerminator</h1>

<input id="codeInput" placeholder="Fehlercode eingeben (z.B. F731)">
<button onclick="suche()">Suchen</button>

<div id="result"></div>

<script>
  const alleCodes = [];

  function suche() {
    const code = document.getElementById("codeInput").value.toUpperCase();

    const treffer = alleCodes.filter(e => e.code === code);

    let html = "";

    if (treffer.length > 0) {

      treffer.forEach(e => {
        html += `
          <div class="resultBox">
            <h2>${e.code}</h2>
            <p><strong>${e.bedeutung}</strong></p>

            <p><b>Hinweis:</b><br>${e.hinweis}</p>

            <p><b>Gerät:</b><br>${e.geraet}</p>
          </div>
        `;
      });

    } else {
      html = `
        <div class="errorBox">
          Kein Eintrag gefunden
        </div>
      `;
    }

    document.getElementById("result").innerHTML = html;
  }
</script>

<script src="data-vaillant-wp-luft.js"></script>
<script src="data-vaillant-gas.js"></script>

</body>
</html>
