<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 20px;
    }

    .button {
      background-color: #007bff;
      color: white;
      padding: 20px;
      text-align: center;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
    }

    .button:active {
      background-color: #0056b3;
    }

    .back {
      margin-top: 20px;
      display: inline-block;
      cursor: pointer;
      color: #007bff;
    }

    .input {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 20px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

<div id="app"></div>

<script>

// 🔧 FEHLERCODES (Vaillant Wärmepumpe)
const fehlercodes = {
  "F532": {
    text: "Durchfluss im Gebäudekreis zu gering",
    ursache: "Volumenstrom zu niedrig, Pumpe oder Ventile prüfen"
  },
  "F714": {
    text: "Druck im Umweltkreis zu niedrig",
    ursache: "Sole-/Kältekreis prüfen"
  },
  "F731": {
    text: "Kältemitteldruck zu hoch",
    ursache: "Hochdruckstörung, Wärmetauscher / Lüfter prüfen"
  },
  "F732": {
    text: "Kompressor-Austrittstemperatur zu hoch",
    ursache: "Kältekreis oder Sensorproblem"
  },
  "F733": {
    text: "Verdampfungstemperatur zu niedrig",
    ursache: "Außeneinheit, Luftstrom oder Kältemittel prüfen"
  },
  "F734": {
    text: "Kondensationstemperatur zu niedrig",
    ursache: "Hydraulik oder Wärmetauscher prüfen"
  },
  "F737": {
    text: "Kondensationstemperatur zu hoch",
    ursache: "Durchfluss zu gering oder Wärmetauscher verschmutzt"
  },
  "F752": {
    text: "Frequenzumrichter Fehler",
    ursache: "Elektronik / Verdichtersteuerung prüfen"
  },
  "F753": {
    text: "Kommunikation zum Frequenzumrichter gestört",
    ursache: "Verbindung oder Elektronik prüfen"
  },
  "F788": {
    text: "Gebäudekreispumpe Fehler",
    ursache: "Pumpe prüfen oder tauschen"
  }
};

// 🔵 STARTSEITE
function showStart() {
  document.getElementById("app").innerHTML = `
    <h1>FehlerTerminator</h1>
    <p style="text-align:center;">Hersteller auswählen</p>

    <div class="grid">
      <div class="button" onclick="selectHersteller('Vaillant')">Vaillant</div>
      <div class="button" onclick="selectHersteller('Stiebel')">Stiebel Eltron</div>
      <div class="button" onclick="selectHersteller('Buderus')">Buderus</div>
      <div class="button" onclick="selectHersteller('Viessmann')">Viessmann</div>
      <div class="button" onclick="selectHersteller('Junkers')">Junkers</div>
      <div class="button" onclick="selectHersteller('Samsung')">Samsung</div>
    </div>
  `;
}

// 🔵 HERSTELLER
function selectHersteller(name) {

  if (name === "Vaillant") {
    document.getElementById("app").innerHTML = `
      <h1>Vaillant</h1>
      <p style="text-align:center;">Kategorie auswählen</p>

      <div class="grid">
        <div class="button" onclick="selectKategorie()">Gasgeräte</div>
        <div class="button" onclick="selectKategorie()">Wärmepumpen</div>
      </div>

      <div class="back" onclick="showStart()">← Zurück</div>
    `;
  } else {
    alert("Noch nicht implementiert: " + name);
  }
}

// 🔵 KATEGORIE → FEHLERCODE SUCHE
function selectKategorie() {
  document.getElementById("app").innerHTML = `
    <h1>Fehlercode eingeben</h1>

    <input id="code" class="input" placeholder="z.B. F732">

    <div class="button" onclick="sucheFehler()">Suchen</div>

    <div class="back" onclick="selectHersteller('Vaillant')">← Zurück</div>
  `;
}

// 🔵 SUCHE
function sucheFehler() {
  const code = document.getElementById("code").value.toUpperCase();

  if (fehlercodes[code]) {
    const f = fehlercodes[code];

    alert(
      code + "\n\n" +
      "Bedeutung: " + f.text + "\n\n" +
      "Typische Ursache: " + f.ursache
    );
  } else {
    alert("Fehlercode nicht gefunden");
  }
}

// 🔵 START LADEN
showStart();

</script>

</body>
</html>
