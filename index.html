<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>

  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 15px;
      font-size: 18px;
      margin-top: 10px;
    }

    button {
      background: #3b6fd8;
      color: white;
      border: none;
      border-radius: 5px;
    }

    .result {
      background: white;
      padding: 15px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .hersteller-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 20px;
    }

    .hersteller-buttons button {
      background: #ddd;
      color: black;
    }

    .active {
      background: #3b6fd8 !important;
      color: white !important;
    }
  </style>
</head>

<body>

<h1>FehlerTerminator</h1>

<input id="searchInput" placeholder="Fehlercode eingeben (z.B. F28 oder 28)">
<button onclick="suche()">Suchen</button>

<div class="hersteller-buttons">
  <button onclick="setHersteller('Vaillant', this)">Vaillant</button>
  <button onclick="setHersteller('Stiebel', this)">Stiebel</button>
  <button onclick="setHersteller('Buderus', this)">Buderus</button>
  <button onclick="setHersteller('Viessmann', this)">Viessmann</button>
</div>

<div id="result"></div>

<script>
  // 🔥 ZENTRALE SAMMLUNG
  let alleCodes = [];

  // 🔥 HERSTELLER FILTER
  let aktiverHersteller = null;

  function setHersteller(name, button) {
    aktiverHersteller = name;

    document.querySelectorAll(".hersteller-buttons button").forEach(btn => {
      btn.classList.remove("active");
    });

    button.classList.add("active");
  }

  // 🔥 NORMALISIERUNG
  function normalizeCode(code) {
    return code
      .toUpperCase()
      .replace(/\s/g, "")
      .replace(".", "");
  }

  function suche() {
    let input = document.getElementById("searchInput").value;
    let suchCode = normalizeCode(input);

    let treffer = alleCodes.filter(e => {
      let code = normalizeCode(e.code);

      let matchCode = code.includes(suchCode);

      let matchHersteller = aktiverHersteller
        ? e.hersteller === aktiverHersteller
        : true;

      return matchCode && matchHersteller;
    });

    let resultDiv = document.getElementById("result");

    if (treffer.length === 0) {
      resultDiv.innerHTML = "<div class='result'>Kein Treffer gefunden</div>";
      return;
    }

    resultDiv.innerHTML = treffer.map(e => `
      <div class="result">
        <h2>${e.code}</h2>

        <strong>${e.bedeutung || ""}</strong><br><br>

        ${e.ursache ? `<strong>Ursache:</strong><br>${e.ursache}<br><br>` : ""}

        ${e.hinweis ? `<strong>Hinweis:</strong><br>${e.hinweis}<br><br>` : ""}

        <strong>Gerät:</strong><br>${e.geraet || "-"}<br><br>

        <small>
        Hersteller: ${e.hersteller || "-"}<br>
        Gruppe: ${e.gruppe || "-"}<br>
        Baujahr: ${e.baujahr || "-"}
        </small>
      </div>
    `).join("");
  }
</script>

<!-- 🔥 DATEN EINBINDEN -->
<script src="data-vaillant-gas.js"></script>
<script src="data-vaillant-wp-luft.js"></script>
<script src="data-vaillant-regler.js"></script>
<script src="data-vaillant-pellet.js"></script>
<script src="data-vaillant-lueftung.js"></script>

<script src="data-stiebel-wp.js"></script>

<script src="data-buderus-gas.js"></script>
<script src="data-buderus-wp.js"></script>

<script src="data-viessmann-gas.js"></script>
<script src="data-viessmann-wp.js"></script>

</body>
</html>
