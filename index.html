<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>FehlerTerminator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background-color: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    input, button {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      font-size: 18px;
      border-radius: 10px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }

    button {
      background-color: #007bff;
      color: white;
      border: none;
    }

    .resultBox {
      margin-top: 15px;
      padding: 20px;
      background: white;
      border-radius: 10px;
    }

    .errorBox {
      margin-top: 20px;
      padding: 20px;
      background: #ffe5e5;
      border-radius: 10px;
    }

    .meta {
      color: #555;
      font-size: 14px;
    }
  </style>
</head>

<body>

<h1>FehlerTerminator</h1>

<input id="codeInput" placeholder="Fehlercode oder Fehlerbild eingeben">
<button onclick="suche()">Suchen</button>

<div id="result"></div>

<script>
  const alleCodes = [];

  function normalisiere(wert) {
    return String(wert)
      .toUpperCase()
      .replaceAll(" ", "")
      .replaceAll(".", "")
      .replaceAll("-", "")
      .trim();
  }

  function suche() {
    const eingabeOriginal = document.getElementById("codeInput").value;
    const eingabe = normalisiere(eingabeOriginal);

    const treffer = alleCodes.filter(e => {
      const codeMatch = e.code && normalisiere(e.code) === eingabe;

      const begriffMatch = e.suchbegriffe && e.suchbegriffe.some(begriff =>
        normalisiere(begriff).includes(eingabe) || eingabe.includes(normalisiere(begriff))
      );

      const textMatch =
        normalisiere(e.bedeutung || "").includes(eingabe) ||
        normalisiere(e.ursache || "").includes(eingabe) ||
        normalisiere(e.hinweis || "").includes(eingabe);

      return codeMatch || begriffMatch || textMatch;
    });

    let html = "";

    if (treffer.length > 0) {
      html += `<p><b>${treffer.length} Treffer gefunden</b></p>`;

      treffer.forEach(e => {
        html += `
          <div class="resultBox">
            <h2>${e.code}</h2>
            <p><strong>${e.bedeutung}</strong></p>

            <p><b>Ursache:</b><br>${e.ursache || "-"}</p>
            <p><b>Hinweis / Behebung:</b><br>${e.hinweis || "-"}</p>
            <p><b>Gerät:</b><br>${e.geraet || "-"}</p>

            <p class="meta">
              Hersteller: ${e.hersteller || "-"}<br>
              Gruppe: ${e.gruppe || "-"}<br>
              Baujahr: ${e.baujahr || "-"}
            </p>
          </div>
        `;
      });
    } else {
      html = `<div class="errorBox">Kein Eintrag gefunden</div>`;
    }

    document.getElementById("result").innerHTML = html;
  }
</script>

<script src="data-vaillant-gas.js"></script>
<script src="data-vaillant-wp-luft.js"></script>
<script src="data-vaillant-wp-sole.js"></script>
<script src="data-vaillant-regler.js"></script>
<script src="data-vaillant-pellet.js"></script>
<script src="data-vaillant-lueftung.js"></script>
<script src="data-vaillant-wp-symptome.js"></script>

<script src="data-stiebel-wp.js"></script>

<script src="data-buderus-gas.js"></script>
<script src="data-buderus-wp.js"></script>

<script src="data-viessmann-gas.js"></script>
<script src="data-viessmann-wp.js"></script>

</body>
</html>
